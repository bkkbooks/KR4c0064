body:
  text: 王司馬集别集類一唐提要臣等謹案王司馬集八卷唐王建撰建字仲和潁州人大厯十年進士太和中為陜州司馬據文獻通考建集本十卷此本為國朝胡介祉所校刋凡古體二卷近體六卷蓋後人所合併前有介祉序謂虞山毛氏曽有刋本行世校對亦未盡善至宫詞自宋南渡後逸去其七好事者妄為補之如淚盡羅巾白樂天詩也鴛鴦瓦上花蘂夫人詩也寶帳平明王少伯詩也日晚長秋與日映西陵樂府銅爵臺詩也銀燭秋光泠畫屏與閒吹玉殿昭華管皆杜牧之詩也獨楊升菴集中别載七首云得之古本今録于後云云介祉所論蓋本之胡仔苕溪漁隱叢話其考證皆精確惟楊慎之言多不足據石鼓文尚能僞造何有于王建宫詞介祉遽從而增入未免輕信之失至于傷近而不見乃玉臺新詠舊題此本訛為傷近者不見江南三臺名見樂府詩集及才調集此本訛為江南臺亦未免小有所失不能全譏毛本但取以相較猶為此善于彼耳乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀王司馬集題詞王司馬建字仲初潁州人登大歷十年進士與中官王樞密名守澄者善司馬自恃才髙每多非刺一日酒中以漢桓靈信任中官起黨錮興廢之事為譏樞密深恨之曰爾所作宫詞百首天下傳誦禁庭深邃何從而得也司馬無以對樞密將劾之司馬乃作詩贈云先朝行坐鎮相隨今上春宫見小時脫下御衣先賜著進來龍馬每教騎長承密㫖歸家少獨奏邊機出殿遲自是姓同親向說九重爭得外人知樞密見詩恐其波及己事乃寢後官陜州司馬所為樂府與張籍齊名而宫詞尤為人傳誦其全集世多鈔本相沿既久亥豕愈多虞山毛氏曾有刋本行世校對亦未盡善至宫詞自宋南渡後逸去其七好事者妄為補之如泪盡羅巾白樂天詩也鴛鴦瓦上花蘂夫人詩也寶帳平明王少伯詩也日晚長秋與日映西陵樂府銅雀臺詩也銀燭秋光冷畫屏與閒吹玉殿昭華管皆杜牧之詩也獨楊升菴集中别載七首云出之古本今録于卷後以俟博雅君子論定云谷園主人茨村胡介祉
