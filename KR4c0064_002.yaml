body:
  text: 王司馬集卷二唐王建撰涼州行涼州四邊沙皓皓漢家無人開舊道邊頭州縣盡蕃兵將軍别一作當築防秋城萬里人家皆已沒年年旌節發西京多來中國收婦女一半生男為漢語蕃人舊日不耕犁相學如今種禾黍驅羊亦著錦為衣為惜氊裘防樹一作鬪時養蠶繅繭成匹帛那將繞帳作旌旗城頭山雞鳴角角洛陽家家學蕃樂寒食行寒食家家出古城老人看屋少年行丘壟年年無舊道車徒散行一作車蹤散亂入衰草牧羊一作童驅牛下塜頭畏有家人來灑掃逺人無墳水頭祭還引婦姑望鄉拜三日無火燒紙錢紙錢一作哀哀那得到黃泉但看壠上無新土此中白骨應無主促刺詞促刺復促刺水中無魚山無石少年雖嫁不將歸頭白猶著父母衣四邊田宅非所有我身不及逐雞飛出門若有歸死處猛虎當衢向前去百年不遣踏君門在家誰喚為新婦豈不見他鄰舍娘嫁來常在舅姑傍壠頭水壠水何年壠頭别不在山中亦嗚咽征人塞耳馬不行未到壠頭聞水聲謂是西流入蒲海還聞北去繞龍城壠東壠西多屈曲野麋飲水長簇簇闕兵夜回水傍住憶著來時磨劍處向前無井復無泉放馬迥回看壠頭樹北邙行北邙山頭少間土盡是洛陽人舊墓舊墓一作洛陽人家歸葬多堆著黃金無買處天涯悠悠葬日促岡坂﨑嶇不停轂髙張素幕繞銘旌夜唱挽歌山下宿洛陽城北復城東魂車祖馬長相逢車轍廣若長安路蒿草少於松柏樹澗底盤陀一作山頭澗底石漸稀盡向墳前作羊虎誰家古一作石碑文字滅後人重取書年月朝朝車馬送葬迥回還起大宅與髙臺溫泉宫行十月一日天子來青繩御路無塵埃宫前內裏湯各别每箇白玉芙蓉開朝元閣向山上起城繞青山龍暖水夜開金殿看星河宫女知更月明裏武皇得仙王母去山雞晝鳴一作明宫中樹溫泉決決出宫流宫使年年修玉樓禁兵去盡無射獵日西麋鹿登城頭梨園弟子偷曲譜頭白人間教歌舞春詞紅煙滿戶日照梁天絲軟弱蟲飛揚菱花霍霍繞帷光美人對鏡著衣裳庭中並種相思樹夜夜還栖雙鳳凰遼東行遼東萬里遼水曲古戍無城復無屋黃雲蓋地雪作山不惜黃金貴衣服戰回各自收弓箭正西回面家鄉逺年年郡縣送征人將與遼東作丘坂寧為草木鄉中生有身不向遼東行塞上梅天山路傍一株梅年年花發黃雲下昭君已殁漢使迥回前後征人惟繫馬日夜風吹滿壠頭還隨壠水東西流此花若近長安路九衢年少無攀處戴勝詞戴勝誰與爾為名木中作窠牆上鳴聲聲催我急種榖家人向田不歸宿紫冠綵綵一作深褐羽斑銜得蜻蜓飛過屋可憐白鷺滿緑池不如戴勝知天時鞦韆詞長長絲繩紫復碧嫋嫋橫枝髙百尺少年女兒重鞦韆盤巾結帶分兩邊身輕裙薄易生力雙手向空如鳥翼下來立定重繫衣復畏斜風髙不得傍人送上那足貴終睹鳴璫鬪自起回回若與髙樹齊頭上寶叉從墮地眼前爭勝難為休足踏平地看始愁開池得古叉美人開池北堂下拾得寶叉金未化鳳凰半在雙股齊鈿花落處生黃泥當時墮地覓不得暗想窗中還夜啼可知將來對夫壻鏡前學梳古時髻莫言至死亦不遺還似前人初得時賽神曲男抱琵琶女作舞主人再拜聽神語新婦上酒勿辭勤使爾舅姑無所苦椒漿湛湛桂座新一雙長箭繫紅巾但願牛羊滿家宅十月報賽南山神青天無風水復一作損碧龍馬上鞍牛服軛紛紛醉舞踏衣裳把酒路傍勸行客田家留客人客少能留我屋客有新漿馬有粟逺行僮僕應苦飢新婦厨中炊欲熟不嫌田家破門戶蠶房新泥無風土行人但飲莫畏貧明府上來可苦辛丁寧回語屋中妻有客勿令兒夜啼雙塜直西有縣路我教丁男送君去精衛詞精衛誰教爾填海海邊石子青磊磊但得海水作枯池海中魚龍一作鱉何所為口穿豈為空銜石山中草木無全枝朝在樹頭暮海裏飛多羽折時墮水髙山未盡海未平願我身死子還生老婦歎鏡嫁時明鏡老猶在黃金縷畫雙鳳背憶昔咸陽初買來燈前自繡芙蓉帶十年不開一片鐵長向暗中梳白髮今日後床重照看生死終當此長别望夫石望夫處江悠悠化為石不回頭山頭日日風復雨行人歸來石應語别鶴曲主人一去池水絶池鶴散飛不相别青天漫漫碧海重知向何山風雪中萬里雖然音影隔一作在兩心終是死生同池邊巢破松樹死樹頭年年烏生子烏棲曲章華宫人夜上樓君王望月西山頭夜深宫殿門不鎖白露滿山山葉墮雉將雛雉咿喔雛出殼毛斑斑嘴啄啄學飛未得一尺髙還逐母行旋母腳麥壟淺淺難蔽身逺去戀雛低怕人時時土中鼓兩翅引雛拾蟲不相離白紵歌二首天河漫漫北斗璨宫中烏啼知夜半新縫白紵舞衣成來遲邀得吳王迎低鬟轉面掩雙袖玉叉浮動秋風生酒多夜長夜未曉月明燈光兩相照後庭歌一作舞聲更窈窕館娃宫中春日暮荔枝木瓜花滿樹城頭烏栖休擊鼓青娥彈瑟白紵舞夜天曈曈不見星宫中火照西江明美人醉起無次第墮叉遺佩滿中庭此時但願可君意回書為宵亦不寐年年奉君君莫棄短歌行人初生日初出上山遲下山疾百年三萬六千朝夜裏分將強半日有歌有舞須早為昨日健於今日時人家見生男女好不知男女催人老短歌行無樂聲飲馬長城窟長城窟長城窟邊多馬骨古來此地無井泉賴得秦家築城卒征人飲馬愁不回長城變作望鄉堆蹄蹤未乾人去近續後馬來泥汚盡枕弓睡著待水生不見隂山在前陳馬蹄足脫裝馬頭健兒戰死誰封侯烏夜啼庭樹烏爾何不向别處棲夜夜夜半當戶啼家人把燭出洞戶驚棲失羣飛落樹一飛直欲飛上天回廽不離舊棲處未明重繞主人屋欲下空中黑相觸風飄雨濕亦不移君家樹頭多好枝簇蠶辭蠶欲老箔頭作繭絲皓皓場寬地髙風日多不向中庭晒蒿草神蠶急作莫悠揚年來為爾祭神桑但得青天不下雨上無蒼蠅下無鼠新婦拜簇願繭稠女灑桃漿男打鼓三日開箔雪團團先將新繭送縣官已聞鄉里催織作去一作送與誰人身上著渡遼水渡遼水此去咸陽五千里來時父母知隔生裹著衣裳如送死亦有白骨歸咸陽營家各與題本鄉身在應無回渡日駐馬相看遼水傍空城雀空城雀何不飛來人家住空城無人種禾黍土間生子草間長滿地蓬蒿幸無主近村雖有髙樹枝雨中無食長苦飢八月小兒挾弓箭家家畏向田頭飛但能不出空城裏秋時百草皆有子報言黃口莫啾啾長爾得成無橫死水運行西江運船立紅幟萬棹千帆繞江水去年六月無稻苗已説水鄉人餓死縣官部船日算程暴風惡雨亦不停在生有樂當有苦三年作官一年行壞舟畏鼠復畏漏恐向太倉折升斗辛勤耕種非毒藥看著不入農夫口用盡百金不為費但得一金即為利逺徴海稻供邊食豈如多種邊頭地當窗織歎息復歎息園中有棗行人食貧家女為富家織翁母隔牆不得力水寒手澀絲脆斷續來續去心腸爛草蟲促促一作織機下啼兩日催成一匹半輸官上項有零落姑未得衣身不著當窗却羡青樓倡十指不動衣盈箱失叉怨貧女銅叉惜於玉失却來尋一日哭嫁時女伴與作粧頭戴此叉如鳳凰雙杯行酒六親喜我家新婦宜拜堂鏡中乍無失髻樣初起猶疑在牀上髙樓翠鈿飄舞塵明日從頭一遍新春燕詞新燕新燕何不定東家緑池西家井飛鳴當戶影悠揚一繞簷頭一繞梁黃姑説向新婦女去年墮子汚衣箱已能辭山復過海幸我堂前故巢在求食慎勿愛髙飛空中飢鳶為爾害辛勤作窠在畫梁願得年年主人富主人故池髙池髙閣上連起荷葉團團蓋秋水主人已逺涼風生舊客不來芙蓉死古宫怨亂烏啞啞飛復啼城頭晨夕宫中栖吳王别殿繞江水後宫不開美人死關山月關山月營開道白前軍發凍輪當磧光悠悠照見三堆兩堆骨邊風割面天欲明金莎嶺西看著沒贈離曲合歡葉墮梧桐秋鴛鴦背飛水分流少年使我忽相棄雌號雄鳴夜悠悠夜長月沒蟲切切冷風入房燈熖滅若知東路各東西彼此不忘同心結收取頭邊蛟龍枕留著箱中雙雉裳我今焚却舊房物免使他人登爾牀宛轉詞宛宛轉轉勝上紗紅紅緑緑苑中花紛紛泊泊夜飛鴉寂寂寞寞離人家水夫謡苦哉生長當驛邊官家使我牽驛船辛苦日多樂日少水宿沙行如海鳥逆風上水萬斛重前驛迢迢後渺渺半夜緣堤雪和雨受他驅遣還復去衣寒衣濕披短莎臆穿足裂忍痛何到明辛苦無處説齊聲騰踏牽船出一間茒屋何所直父母之鄉去不得我願此水作平田長使水夫不怨天田家行男聲欣欣女顔悅人家不怨言語别五月雖熱麥風清簷頭索索繅車鳴野蠶作繭人不取葉間撲撲秋蛾生麥收上場絹在軸的知輸得官家足不望入口復上身且免向城賣黃犢田家衣食無厚薄不見縣門身即樂去婦新婦去年胼手足衣不暇縫蠶廢簇白頭使我憂家事還如夜裏燒殘燭當初為取一作信傍人語豈道如今自辛苦在時縱嫌織絹遲有絲不上鄰家機神樹詞我家家西老棠樹須晴即晴雨即雨四時八節上杯盤願神莫離神處所男不著丁女在舍事官上下無言語老身長健樹婆娑萬歲千年作神主祝鵲神鵲神鵲好言語行人早回多利賂我今庭中栽好樹與汝作巢當報汝古謡一東一西壠頭水一聚一散天邊霞一來一去道上客一顛一倒池中麻公無渡河渡頭惡天一作風兩岸逺波濤塞川如疊坂幸無白刃驅向前何用將身自棄捐蛟龍嚙骨魚食血黃泥直下無青天男兒縱輕婦人語惜君性命還須取婦人無力挽斷衣舟沉身死悔難追公無渡河公須自為海人謡海人無家海裏住採珠殺象為歲賦惡波橫天山塞路未央宫中常滿庫行見月月初生居人見月一月行行行一年十二月強半馬上看盈一作圓缺百年歡樂能幾何在家見少行見多不緣衣食相驅遣此身誰願長奔波篋中有帛倉有粟豈向天涯走碌碌家人一作中見月望我歸正是道上思家時七夕曲河邊獨自看一作對星宿夜織天絲難接續拋梭振躡動明璫為有秋期眠不足遙愁今夜河水隔龍駕車轅鵲填石流蘇翠帳星渚間環珮無聲燈寂寂兩情纒綿忽如故復畏秋風生曉路幸回郎意且斯須一年中别今始初明星未出少停車兩頭纖纖兩頭纖纖青玉玦半白半黑頭上髮逼逼仆仆春氷裂磊磊落落桃花一作初結獨漉歌獨獨漉漉鼠食貓肉烏日中鶴露宿黃河水直人心曲寄逺曲美人别來無處所巫山月明湘江雨千回相見不分明井底看星夢中語兩心相對尚難知何况萬里不相疑傷韋令孔雀詞可憐孔雀初得時美人為爾别開池池邊鳳凰作伴侣羌聲鸚鵡無言語一作尋花飛雕籠玉架嫌不栖夜夜思歸向南舞一作南海枝如今憔悴人見惡萬里更求新孔雀熱眠雨水飢拾蟲翠尾盤泥金彩落多時人養不解飛海山風黑何處歸傷鄰家鸚鵡詞東家小女不惜錢買得鸚鵡獨自憐自從死却家中女無人更共鸚鵡語十日不飲一滴漿淚漬緑毛頭似鼠古關啞咽畜哀怨開籠放飛離人眼短聲亦絶翠臆翻新墓崔嵬舊巢逺此禽有志女有靈定為連理相並生春來曲春欲來每日望春門早開黃衫白馬帶塵土逢著探春人却回御堤內園曉過急九衢大宅家家入看春少女染桃花露粧初出紅猶濕光風暾暾蝶宛宛繞一作庭樹氣匝枝柯軟可憐寒食街中郎早起著得單衣裳少年即是春好處似我白頭無好樹春去曲春已去花亦不知春去處緣岡繞澗却歸來百回看著無花樹就中一夜東風惡收紅拾紫無遺落老夫不比少年兒不中數與春别離東征行桐柏水西賊星落梟雛夜飛林木惡相國刻日波濤清當朝自請東南征舍人為賔侍郎副曉覺蓬萊欠珮聲玉階舞蹈謝旌節生死向前山可穴同時賜馬并賜衣御樓看帶弓刀發馬前猛士三百人金書左右紅旗新司庖常膳皆得對好事將軍封爾身男兒生殺在手裏營門老將皆憂死曈曈白日當南山不立功名終不還荆門行江邊行人暮悠悠山頭殊未見荆州峴亭西南路多曲櫟林深深石鏃鏃看炊紅米煮白魚夜向雞鳴店家宿南中三月蚊蚋生黃昏不聞人語聲生紗帷疏薄如霧隔衣噆膚耳邊鳴欲明不待燈火起喚得官船過蠻水女兒停客茒屋新開門掃地桐花裏犬聲撲撲寒溪煙人家燒竹種山田巴雲欲雨熏石熱麋鹿過江蟲出穴大蛇過處一山腥野牛驚跳雙角折斜分漢水橫千山山青水緑荆門關向前問箇長沙路舊是屈原沉溺處誰家丹旐已南來逢著流人從此去月明山鳥多不栖下枝飛上髙枝啼主人念逺心不懌羅衫卧對章臺夕紅燭交橫各自歸酒醒還是他鄉客壯年留滯尚思家况復白頭在天涯鏡聽詞重重摩娑嫁時鏡夫壻逺行憑鏡聽回身不遣别人知人意丁寧鏡神聖懷中收拾雙錦帶恐畏街頭見驚怪嗟嗟㗫㗫下堂階獨自竈前來跪拜出門願不聞悲哀郎在任郎廽未廽月明地上人過盡好語多同皆道來卷帷上牀喜不定與郎裁衣失翻正可中三日得相見重繡鏡囊磨鏡面行宫詞上陽宫到蓬萊殿行宫巖巖遙相見向前天子行幸多馬蹄車轍山川遍當時州縣每年修皆留內人看玉案禁兵奪得明堂後長閉一作間桃源與綺繡一作岫開元歌舞古一作百草頭梁州樂人世嫌舊官家乏人作宫戶不泥宫牆斫宫樹兩邊仗屋半崩摧夜火入林燒殿柱休封中嶽六十年行宫不見人眼穿羽林行長安惡少出名字樓下劫商樓上醉天明下直明光宫散入五陵松柏中百回殺人身合死赦書尚有收城功九衢一日消息定鄉吏籍中重改姓出來依舊屬羽林立在殿前射飛禽射虎行自去射虎得虎歸官差射虎得虎遲獨行以死當虎命兩人相疑終不定朝朝暮暮空手回山下緑苗成道徑逺立不教汚箭鏃聞死還來分虎肉惜留猛虎著深山射殺恐畏終身間逺將歸逺將歸勝未别離時在家相見熟新歸歡不足去願車輪遲回思馬蹄速但令在舍相對貧不向天涯金繞身尋橦歌人間百戲皆可學尋橦不比諸餘樂重梳短髻下金鈿紅帽青巾各一邊身輕足栖勝男子繞竿四面爭先緣習多倚附欹一作欺竿滑上下蹁躚皆著襪翻身埀頸欲落地却住把煙初似歇大竿百夫擎不起裊裊半在青雲裏纖腰女兒不動容戴行直舞一曲終回頭但覺人眼見矜難恐畏天無風險中更險無蹉一作何曾失山鼠懸頭猿挂膝小垂一手當舞盤斜慘雙蛾當落日斯須改變曲解新憤舞歡他平地人散時滿面生顔色行步依前無氣力宫中調笑詞四首團扇團扇美人並來遮面玉容憔悴三年誰復思量管絃絃管絃管春草昭陽路斷蝴蝶蝴蝶飛上金花枝葉君前對舞春風百葉桃花樹紅紅樹紅樹燕語鶯啼日暮羅袖羅袖暗舞春風已舊遙看歌舞玉樓好日新粧坐愁愁坐愁坐一日虛生虛過楊栁楊栁日暮白沙渡口船頭江水茫茫商人少婦斷腸腸斷腸斷鷓鴣夜啼失伴銅雀臺嬌愛更何日髙臺空數層含啼映雙袖不忍看西陵漳水東流無復來百花輦路為蒼苔青樓月夜長寂寞碧雲日莫空徘徊君不見鄴中萬事非昔時古人不在今人悲春風不逐君王去草色年年舊宫路宫中歌舞已浮雲空指行人往來處王司馬集卷二
