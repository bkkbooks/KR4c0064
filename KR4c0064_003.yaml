body:
  text: 王司馬集卷三唐王建撰送人遊塞初晴天墮絲晚色上春枝城下路分處邊頭人去時停車數行日勸酒問回期亦是茫茫客還從此别離塞上逢故人百戰一身在相逢白髮生何時得鄉信每日算歸程走馬登寒壠驅羊入廢城羌笳三兩曲人醉海西營南中天南多鳥聲州縣半無城野市依蠻姓山村逐水名瘴烟沙上起隂火雨中生獨有求珠客年年入海行汴路水驛晚泊水邊驛栁塘初起風蛙鳴蒲葉下魚入稻花中去舍已云逺問程猶向東近來多怨别不與少年同淮南使回留别竇侍御戀戀春恨結綿綿淮草深病身愁至夜逺道畏逢隂忽逐酒杯㑹暫同風景心從今一分散還是繞枝禽汴路即事千里河烟直青槐夾岸長天涯同此路人語各殊方草市迎江貨津橋稅海商回看故宫栁憔悴不成行山居屋在瀑泉西茅簷一作屋下有溪閉門留野鹿分食養山雞桂熟長收子蘭生不作畦初開洞中路深處轉松梯醉後憶山中故人花開草復秋雲水自悠悠因醉暫無事在山難免愁遇晴須看月聞健且登樓暗想山中伴如今盡白頭送流人見說長沙去無親亦共愁隂雲鬼門夜寒雨瘴江秋水國山魈引蠻鄉洞主留漸看歸處逺一作阻垂白住炎洲貧居眼底貧家計多時總莫嫌蠧生謄藥紙字暗一作脫換書籖避雨濕黃葉遮風下黑簾近來身不健時就六壬占過趙居士擬直草堂處所休師竹林北空可兩三間雖愛獨居好終來相伴間猶嫌近前樹為礙看南山的有深耕處春初須早還新開望山處新開望山處今朝減病眠應移千里道猶自數峰偏故欲遮春巷還來繞暮天老夫行步弱免到寺門前題東華觀路盡烟水外院門題上清鶴雛虛解語瓊葉軟無聲白髮道心熟黃衣仙骨輕寂寥虛境裏何處覓長生飯僧别屋炊香飯薰辛不入家溫泉調葛麵淨手摘藤花蒲鮓除青葉芹虀帶紫芽願師常伴食消氣有薑茶照鏡忽自見憔悴壯年人亦疑髮緣多病落力為不行衰暖手揉雙目看圖引四肢老來真愛道所恨覓還遲歸昭應留别城中喜得近京城官卑意亦榮並牀歡未定離室思還生計拙偷間住經過買日行如無自來分一驛是遙程答寄芙蓉冠子一學芙蓉葉初開映水幽雖經小一作巧兒手不稱老夫頭枕上眠常戴風前醉恐柔明年有閨閣此樣必難求長安春遊騎馬傍間坊新衣著雨香桃花紅粉醉栁樹一作絮白雲狂不覺愁春去何曾得日長牡丹相次發城裏又須忙冬夜感懷晚年恩愛少耳目靜於僧一夜不聞語空房惟有燈氣噓寒被濕霜入破窗凝一作月照冷階凝斷得人間事長如此亦能初到昭應呈同僚白髮初為吏有慙年少郎自知身上拙不稱世間忙秋雨縣牆緑暮山宫樹黃同官若容許長借老僧房縣丞㕔即事宫殿半山上人家髙下居古㕔眠受魘老吏語多虛雨水洗荒竹溪沙填廢渠聖朝收外府皆自九天除間居即事老病貪光景尋常不下簾妻愁耽酒僻人怪考詩嚴小婢偷紅紙嬌兒弄白髯有時看舊卷未免意中嫌林居荒林四面通門在野田中頑僕長如客貧居未勝蓬舊綿衣不暖新草屋多風唯去山南近間親販藥翁原上新居十三首新占原頭地本無山可歸荒藤生葉晚老杏著花稀厨舍近泥竈家人初飽薇弟兄今四散何日更相依一家榆栁新四面逺無鄰人少愁聞病莊孤幸得貧耕牛長願飽樵僕每憐勤終日憂衣食何由脫此身長安無舊識百里是生一作天涯寂寞思逢友荒凉喜見花訪僧求賤藥將馬中豪家乍一作作得新蔬菜朝盤忽覺奢雞鳴村舍遙花發亦蕭條野竹初生筍溪田未得苗家貧僮僕瘦春冷菜蔬焦甘分長如此無名在聖朝春來梨棗盡啼哭小兒饑鄰富雞長去莊貧客漸稀借牛耕地晚賣樹納錢遲牆下當官路依山補竹籬自掃一間房唯鋪獨卧牀野羮溪菜滑山紙水苔香陳藥初和白一作蜜新經未入黃近來心力少休讀養生方擬作讀經人空房置淨巾鎖茶藤篋密曝藥竹牀新老病應隨業因緣不離身焚香向居士無計出諸塵移家近住村貧苦自安存細問梨果植逺求花藥根倩人開廢井趂犢入新園長愛當山立黃昏不閉門和暖繞林行新貧足喜聲掃渠憂竹旱澆地引蘭生山客憑栽樹家僮使入城門前粉壁上書著縣官名住處鐘鼓外免爭當路橋身間時却困兒病可來嬌雞睡日陽暖蜂一作蝶狂花艷燒長安足門戶疊疊看登朝近來年紀到世事總無心古鶴憑人榻間詩任客吟送經還野院移石入幽林谷口春風惡梨花蓋地深懶更學諸餘林中掃地居膩衣穿不洗白髮短慵梳苦相常多淚勞生自悟虛間行人事絶親故亦無書住處去山近傍園麋鹿行野桑穿井長荒竹過牆生新識鄰里面未諳村社情名田無力及賤賃與人耕送李評事使蜀勸酒不依巡明朝萬里人轉江雲棧細近驛板橋新石冷啼猿影松昏戲鹿塵少年為客好况是益州春新修道居世間無所入學道處新成兩面有山色六時聞磬聲間加經遍數老愛字分明若得離煩惱焚香過一生贈洪哲師老僧真古畫間座語中㕔識病方書聖諳山草木靈人來多一作還施藥願滿不持經相伴尋溪竹秋苔襪履青題法雲禪院僧不剃頭多日禪來白髮長合村迎住寺同學乞修房覺少持經力憂無養病糧上山猶得在自解衲衣裳贈溪翁溪田借四鄰不省解憂身看日和仙藥書符救病人伴僧齊過夏中酒卧經旬應得丹砂一作霜力春來黑髮新謝李續主簿館舍幸相近因風及病身一官雖隔水四韻一作五字是同人衰卧朦朧曉貧居冷落春少年無不好莫恨滿頭塵寒食田舍清明日家家出火遲白衫眠古巷紅一作結索搭髙枝紗帶生難結銅叉重欲垂斬新衣踏盡還似去年時貽小尼師新剃青頭髮生來未掃眉身輕禮拜穩心慢記經遲喚起猶侵曉催齊已過時春晴階下立私地弄花枝惜歡當歡須且歡過後買應難歲去停燈守花開把火看狂來欺酒淺愁盡覺天寬次第頭皆白齊年人已殘山中惜花恕一作愁看花漸稀罪過酒醒時尋覓風來處驚張夜落時遊絲纒一作縈故蘂宿葉守空枝開取當一作溪軒地年年樹底期和武門下傷韋令孔雀孤號秋閣隂韋令在時禽覓伴海山黑思鄉橘柚深舉頭聞舊曲顧尾惜殘金憔悴不飛去重君池上心題所賃宅牡丹花賃宅得花饒初開恐是妖粉光深紫膩肉色退紅嬌且願風留著惟愁日炙燋可憐零落蘂收取作香燒隱者居山人住一作在處髙看日上蟠桃雪縷青山脉雲生白鶴毛朱書護身咒水噀斷邪刀何物中一作堪長食胡麻慢火熬昭應官舍繞㕔春草合知道縣家間行見雨遮院卧看人上山避風新浴後請假未醒間朝客輕卑吏從他不往還王司馬集卷三
