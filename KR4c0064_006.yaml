body:
  text: 王司馬集卷六唐王建撰寄杜侍御何須服藥覓升天粉閣為郎即是仙買宅但幽從索價栽松取活不爭錢退朝寺裏尋荒塔經宿城南看野泉道氣清凝分曉爽詩情冷瘦滴秋鮮學通儒釋三千卷身擁旌旗二十年春巷偶過同戶飲暖窗時語對牀眠破除心力緣書癖傷瘦花枝為酒顛今日總來歸聖代一作今日總離軍馬地丈人先逹幸相憐寄上韓愈侍郎重登大學領儒流學浪詞鋒壓九州不以雄名疏野賤唯將直氣折王侯詠傷松桂一作柏青山瘦取盡珠璣碧海愁叙述異篇經總别鞭驅險句最一作總先投碑文合遣貞魂謝史筆應令諂骨羞清俸探將還酒債黃金旋得起書樓參來擬設官人禮朝退多逢月閣遊見向一作說雲泉求住處若無知薦一生休贈華州鄭大夫此官出入鳳池頭通化門前第一州少華山雲當驛起小敷溪水入城流空間地內人初滿詞訟牌前草漸稠報狀拆開知足雨赦書宣過喜無囚自來不說雙旌貴恐替長教百姓愁公退晚凉無一事一作吏散日髙衙府靜步行携客上南樓寄賀田侍中東平功成使回髙品滿城傳親見沂公在陳前百里旗幡衝即斷兩重衣甲射皆穿探知㸃檢兵應怯算得新移柵未堅營被數驚乘勢破將經頻敗遂生全密招殘寇防人覺遙斬元凶恐自專首讓諸軍無敢近功歸部曲不爭先開通州縣斜連海交割山河直到燕戰馬散驅還逐草肉牛齊散却耕田府中獨拜將軍貴門下兼分宰相權唐史上頭功第一春風雙節好朝天送裴相公上太原還携堂印向并州將相兼權是武侯時難獨當天下事功成却進手中籌再三陳乞爐烟裏前後封章玉案頭朱架早朝排劍㦸緑槐殘雨一作花裏看張油遙知雁塞從今好直得漁陽已北愁邊鋪驚巡旗盡換山城候館壁一作欲過館重修千羣白創兵迎節十對紅粧妓打毬聖主分明教暫去不須髙起見京樓王司馬集卷六
