body:
  text: 王司馬集卷七唐王建撰秋夜夜久葉露滴秋蟲入戶飛卧多骨髓冷起覆舊綿衣水精映水色不别向月光還度傾在荷葉中有時看是露香印間坐燒印香滿戶松柏氣火盡轉分明青苔碑上字秋燈向壁暖悠悠羅幃寒寂寂斜照碧山圖松間一片石落葉陳緑向參差初紅已重疊中庭初掃地繞樹三兩葉園果雨中梨果病每樹無數箇小兒出入看一半鳥啄破野菊晚艷出荒籬冷香著秋水憶向山中見伴蛩石壁裏荒園朝日滿園霜牛衝籬落壞掃掠黃葉中時時一窠薤南澗野桂香滿溪石莎寒覆水愛此南澗頭終日潺湲裏晚蝶粉翅嫩如水繞砌乍依風日髙山露解飛入菊花中田家啾啾雀滿樹靄靄東坡雨田家夜無食水中摘禾黍新嫁娘三首鄰家人未識床上坐堆堆郎來傍門戶滿口索錢財錦障兩邊橫遮掩侍娘行遣郎鋪簟席相並拜親情三日入厨下洗手作羮湯未諳姑食性先遣小姑嘗故行宫寥落古行宫宫花寂寞紅白頭宫女在間坐説玄宗酬從姪再看詩本眼暗沒功夫慵來翦刻磨自看花樣古稱得少年無别自栽小樹去年今日栽臨去見花開好住守空院夜間人不來早發汾南橋上車馬發橋南煙樹開青山斜不斷迢遞故鄉來宫中三臺二首魚藻池邊射鴨芙蓉苑裏看花日色柘袍相似不著紅鸞扇遮池北池南草緑殿前殿後花紅天子千年萬歲未央明月清風江南臺四首揚州橋邊少婦長安城裏商人三年不得消息各自拜鬼求神青草湖邊草色飛猿嶺上猿聲萬里湘江客到有風有雨人行樹頭花落花開道上人去人來朝愁暮愁即老百年幾度三臺間身強健且為頭白齒落難追準擬百年千歲能得一作不知幾許多時王司馬集卷七
