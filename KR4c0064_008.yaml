body:
  text: 王司馬集巻八唐王建撰御獵青山直遶鳳城頭滻水斜分入御溝新教内人唯射鴨長隨天子苑東遊長門燭秋夜牀前蠟燭㣲銅壺滴盡曉鐘遲殘光一作花欲滅還吹著年少宫人未睡時過綺岫宫東都永寜縣西五里玉樓傾倒粉牆空重疊青山遶故宫武帝去來羅袖盡野花黄蝶領春風朝天子詞十首寄魏博田侍中山川初展一作定國圖寛未識龍顔坐不安風動白髯旌節下過時天子御樓看相感君臣總淚流恩深一作榮舞蹈不知休初從戰地來無物唯奏新添十八州催修水殿宴沂公與别諸侯總不同隔月太常先習樂金書牌纛彩雲中無人敢奪在先籌天子門邊送與毬遥索綵箱新様錦内人舁出馬前頭御馬牽來親自試珠毬到處玉蹄知殿頭宣賜連催上未解紅纓不敢騎老作三公經獻夀臨時猶自語差池私從班裏來長跪捧上金盃便合儀四海無波乞放閑三封手疏犯龍顔他時若有邊塵動不待天書自出山戎馬悠悠未盡歸玉闗猶隔吐蕃旗老臣一表求髙卧邊事從今欲問誰威容難畫一作盡改頻頻眉目分毫恐不真有詔别圖書閣上先教粉本定風神重賜弓刀内宴廻看人城外滿樓臺君臣不作多時别收盡邊旗當日來霓裳詞十首弟子部中留一色聽風聽雨作霓裳散聲未作重來授直到牀前見上皇自直梨園得出稀更畨上曲不教歸一時跪拜霓裳徹立地堦前賜紫一作綵衣勑賜宫人澡浴廻遥看美女院門開一山星月霓裳動好自先從殿後來旋翻一作自修曲譜聲初起除却梨園未教人宣示書家分手寫中官走馬賜功臣傳呼法部按霓裳新得承恩别作行應是一作日晚貴妃樓上看内人舁出綵羅箱伴教霓裳有貴妃從初直到曲成時日長耳裏聞聲熟拍數分毫錯總知中管五絃初半曲遥教合上隔簾聽一聲聲向天頭落學得仙人夜唱經絃索摐摐隔彩雲五更初發滿宫聞武皇自送西王母新染霓裳月色裙朝元閣上風初起夜聽霓裳玉露寒宫女月中更替立黄金梯滑並行難知向華清秋月滿山頭山底種長生去時留下霓裳曲總是離宫别館聲宫前早春酒幔髙樓一百家宫前楊栁寺前花内園分得温湯水二月中旬已進𤓰奉同曾郎中題石瓮寺得嵌韻寺門連内遶丹巖下界雲開數過帆遥指上皇飜曲處百官題字滿西嵌舊宫人先帝舊宫宫女在亂絲猶挂鳳凰釵霓裳法曲渾抛却獨自花間掃玉堦贈人二首金爐烟裏要班頭欲得歸山可自由每度報朝愁入閣在先教示小千牛多在蓬萊可一作少在家越緋衫上有紅霞朝廻不向諸餘處騎馬城西檢校花樓前天寳年前勤政樓每年三日作千秋飛龍老馬曾教舞聞着音聲總舉頭寄劉蕡問疾年少病多應為酒誰家將息過今春賖來半夏重薰盡投着山中舊主人聽雨半夜思家睡裏愁雨聲落落屋簷頭照泥星出依前黑淹爛庭花不肯休新晴夏夜新晴星校少雨收殘水入天河簷前着熟衣裳坐風冷渾無撲火蛾秋日後在一作住處近山常足雨聞晴㬠曝舊芳茵立秋日後無多熱漸覺生衣不着身哭孟東野二首吟損秋天月不明蘭無香氣鶴無聲自從東野先生死側近雲山得散行老松臨死不生枝東野先生早哭兒但是洛陽城裏客家傳一本杳殤詩寄蜀中薛濤校書萬里橋邊女校書枇杷花裏閉門居掃眉才子于今少管領春風總不如路中上田尚書去路何詞見六親手中刀尺不如人可憐池閣秋風夜愁一作怨緑嬌紅一遍新于主簿㕔看花小葉稠枝粉壓催暖風吹動鶴翎開若無别事為留滯應便抛家宿看來江樓對面寄杜書記竹烟花雨細相和看着閑書睡更多好是主人無事日應持小酒按新歌十五夜望月寄杜郎中時㑹琴客夜市千燈照碧雲髙樓紅袖客紛紛如今不似時平日猶自笙歌徹曉聞觀蠻妓欲說昭君歛翠蛾清聲委曲怨於歌誰家年少春風裏抛與金錢唱好多送顧非熊秀才歸丹陽江城栁色海門烟欲到茅山始下船知道君家當瀑布菖蒲潭在草堂前老人歌白髮老人垂淚行上皇生日出京城如今供奉多新意錯唱當時一半聲和元郎中從八月十一至十五夜翫月五首半秋初入中旬夜已向堦前守月明從未圓時看却好一分分見傍輪生亂雲遮却臺東月不許教依次第看莫為詩家先見鏡被他籠與作艱難今夜月明勝昨夜新添桂樹近東枝立多地濕舁牀坐看過墻西寸寸遲月似圓來色漸凝玉盆盛水欲侵稜夜深盡放家人睡直到天明不炷燈合望月時長望月分明不得似今年仰頭五夜風中立一作坐從未圓時直到圓對酒為病比來渾斷絶縁花不免却知聞從來事事闗身少主領春風只在君曉望華清宫曉來樓閣更鮮明日出闌干見鹿行武帝自知身不死看修玉殿號長生贈李愬僕射二首和雪翻營一夜行神旗凍定馬無聲遥看火號連營赤知是先鋒已上城旗旛四面下營稠手詔頻來老將憂每日城南空挑戰不知生縛入唐州秋夜對雨寄石甕寺二秀才夜山秋雨滴空廊燈照堂前樹葉光對坐讀書經巻後自披衣被掃僧房華清宫前栁楊栁宫前忽地春在先驚動探春人曉來唯欠驪山雨洗却枝頭緑上塵别楊校書從軍末馬一作未滿十三年白髮營中聽早蟬故作老丞身不避縣名昭應管山泉和門下武相公春曉聞鶯侵黑行飛一兩聲春寒囀小未分明若教更解諸餘語應向宫花不惜情田侍郎歸鎮八首去處長將決勝籌廻廻身在陣前頭賊城破後先鋒入看着紅粧不敢收熨帖朝衣抛戰袍䕫龍班裏侍中髙對時先奏牙間將次第天恩與節旄踏着家鄉馬脚輕暮山秋色眼前明老人上酒齊頭拜得侍中來盡再生功成誰不擁藩方富貴還須是本鄉萬里雙旌汾水上玉鞭遥指白雲莊皷吹旛旗道兩邊行男走女喜駢闐舊交省得當時别指㸃如今却少年廣場破陣樂初休彩纛髙於百尺樓老將氣雄爭起舞管絃廻作大纒頭笳聲萬里動燕山草白天清塞馬閒觸處不如别處樂可憐秋月照江闗將士請衣忘却貧緑窗紅燭酒樓新家家盡踏還鄉曲明月街中不絶人寄廣文張博士春明門外作卑官病友經年不得看莫道長安近於日昇天却易到城難早春書情漸老風光不着身花溪栁陌早逢春近來行到門前少趂暖閑眠似病人唐昌觀玉蘂花一樹籠􅀢玉刻成飄廊㸃地色輕輕女冠夜覓香來處唯見堦前碎月明眼病寄同官天寒眼痛少心情隔霧看人夜裏行年少徃來常不住墻西凍地馬蹄聲九日登叢臺平原池閣在誰家雙塔叢臺野菊花零落故宫無入路西來澗水繞城斜題酸棗縣蔡中郎碑蒼苔滿字土埋龜風雨銷磨絶妙詞不向圖經中舊見無人知是蔡邕碑江陵使至汝州廻看巴路在雲間寒食離家麥熟還日暮數峰青似染商人說是汝州山十五夜望月中庭地白樹棲鴉冷露無聲濕桂花今夜月明人盡望不知秋思在誰家宫詞一百首蓬萊正殿壓金鼇紅日初生碧海濤開着五門遥北望柘黄新帕御牀髙殿前傳㸃各依班召對西來六詔蠻上得青花龍尾道側身偷覷正南山龍烟日暖一作氣紫曈曈宣政門當玉殿風五刻閤前卿相出下簾聲在半天中白玉窗前起草臣櫻桃初赤賜嘗新殿頭傳語金階逺因進詞來謝聖人内人對御疊花箋繡坐移來玉案邊紅蠟光中呈草本平明舁出閤門宣千牛仗下放朝初玉案傍邊立起居每日進來金鳳紙殿頭無事不多書延英引對碧衣郎江硯宣毫各别牀天子下簾親考試宫人手裏過茶湯未明開着九重闗金畫黄龍五色幡直到銀臺排仗合聖人三殿冊西畨少年天子重邊功親到凌烟畫閣中教覓勲臣寫圖本長生殿裏作屏風丹鳳樓門把火開先排法駕出蓬萊棚前走馬人傳語天子南郊一宿廻樓前立仗看宣赦萬歳聲長再拜齊日照彩盤髙百尺飛仙爭上取金鷄集賢殿裏圖書滿㸃勘頭邊御印同真跡進來依數字别收鎻在玉函中秘殿清齋刻漏長紫㣲宫女夜焚香拜陵日近公卿發鹵簿分頭出太常新調白馬怕鞭聲供奉騎來遶殿行為報諸王侵早入隔門催進打毬名對御難爭第一籌殿前不打背身毬内人唱好龜兹曲天子龍輿過玉樓新衫一様殿頭黄銀帶排方獺尾長總把金鞭騎御馬緑鬃紅額麝香香羅衣葉葉繡重重金鳳銀鵝各一叢每遍舞時分兩向太平萬歳字當中魚藻宫中鎻翠娥先皇行處不曾過如今池底休鋪錦菱角鷄頭積漸多殿前明日中和節連夜瓊林散舞衣傳報所司分蠟燭監門金鎻放人歸五更三㸃索金車盡放宫人出看花仗下一時催立馬殿頭先報内園家城東北面望雲樓半下珠簾半上鈎騎馬行人長逺過恐防天子在樓頭射生宫女宿紅妝請得新弓各自張臨上馬時齊賜酒男兒跪拜謝君王新秋白兎大於拳紅耳霜毛趂草眠天子不教人射殺玉鞭遮到馬蹄前内鷹籠脫解紅絛鬬勝爭飛出手髙直上碧雲還却下一雙金爪菊花毛競渡船頭挿綵旗兩邊濺水濕羅衣池東爭向池西岸先到先書上字歸燈前飛入玉階蟲未卧常聞半夜鐘看着中元齋日到自盤金線繡真容一作芙蓉紅燈睡裏喚春雲雲上三更直宿分金砌雨來行歩滑兩人擡起隠花裙一時起立吹簫管得寵人來滿殿迎整頓衣裳皆着却舞頭當拍第三聲琵琶先抹六么頭小管丁寜側調愁半夜美人雙唱起一聲聲出鳳凰樓春池日暖少風波花裏牽船水上歌遥索劍南新様錦東宫先釣得魚多十三初學擘箜篌弟子名中被㸃留昨日教坊新進入並房宫女與梳頭紅蠻捍撥帖胸前移坐當頭近御筵用力獨彈金殿響鳳凰飛出四條絃春風吹雨灑旗竿得出深宫不怕寒誇道自家能走馬圍中横過覓人看粟金腰帶象牙錐散挿紅翎玉突枝旋獵一邊還引馬歸來鷄兎遶鞍垂雲駮花驄各試行一般毛色一般纓殿前來徃重騎過欲得君王别賜名每夜停燈熨御衣銀薫籠底火霏霏遥聽帳裏君王覺上直鐘聲始得歸因喫櫻桃病放歸三年着破一作盡舊羅衣内中人識從來去結得金花上貴妃欲迎天子看花去下得金階却悔行恐見失恩人舊院廻來衝一作憶着五絃聲徃來舊院不堪修教近宣徽别起樓聞有美人新進入六宫未見一時愁一作宫中誰識大家愁自誇歌舞勝諸人恨未承恩出内頻連夜宫中修别院地衣簾額一時新悶來無處可思量旋下金堦旋憶牀收得山丹紅蘂粉窗中先一作洗却麝香黄蜂鬚蟬翅薄鬆鬆浮動搔頭似有風一度出時抛一遍金條零落滿函中合暗報來門鎻了夜深應别喚笙歌房房下着珠簾睡月過金堦白露多御厨不食索時新每見花開即苦春白日卧多嬌似病隔簾教喚女醫人叢叢洗手遶金盆旋拭紅巾入殿門衆裏遥抛新橘子在前收得便承恩御池水色春來好處處分流白玉渠宻奏君王知入月喚人相伴洗裙裾移來女樂部頭邊新賜花檀木五絃緶得紅羅手帕子中心細畫一雙蟬新晴草色緑温暾山雪初消滻水渾今日踏青歸校晚傳聲留着望春門西樓新換珠簾額中尉明朝設内家一様金盤五千面紅蘇㸃出牡丹花盡送春毬出内家記廵傳把一枝花散時各自燒紅燭相逐行歸不上車家常愛着舊衣裳空挿紅梳不作粧忽地下堦裙帶解非時應得見君王别勑教歌不出房一聲一遍奏君王再三博士留殘拍索向宣徽作徹章行中第一爭先舞博士傍邊亦被欺忽覺管絃偷破拍急翻羅袖不教知私縫黄帔捨釵梳欲得金仙觀内居近被君王知識字收來案上檢文書日冷天晴近臘時玉堦金瓦雪澌澌浴堂門外抄名入公主家人謝面脂未承恩澤一家愁乍到宫中憶外頭新學管絃聲尚澀側商調裏唱伊州東風潑火雨新休舁盡春泥掃雪溝走馬犢車當御路漢陽宫主進鷄毬風簾水閣壓芙蓉四面勾欄在水中避熱不歸金殿宿秋河織女夜妝紅聖人生日明朝是私地先須屬内監自寫金花紅牓子前頭先進鳳凰衫避暑昭陽不擲盧井邊含水噴鵶雛内中數日無呼喚搨得滕王蛺蝶圖内宴初休入二更殿前燈火一天明中官傳㫖音聲散諸院門開觸處行玉蟬金雀三層挿翠髻髙叢緑鬂虚舞處春風吹落地歸來别賜一頭梳樹葉初成鳥䕶窠石榴花裏笑聲多衆中遺却金釵子拾得從他要贖麽小殿初成粉未乾貴妃姊妹自來看為逢好日先移入續向街西索牡丹内人相續報花開准擬君王便看來逢着五絃琴繡袋宜春院裏按歌廻廵吹慢遍不相和暗數看誰曲校多明日梨花園裏見先須逐一作直得内家歌黄金合裏盛紅雪重結香羅四出花一一傍邊書勑字中官送與大臣家未明東上閤門開排仗聲從後殿來阿監兩邊相對立遥聞索扇一時廻宫人早起笑相呼不識堦前掃地夫乞與金錢爭借問外頭還似此間無小隨阿姊學吹笙好見君王賜與名夜拂玉牀朝把鏡黄金殿外不教行日髙殿裏有香烟萬歳聲長動九天妃子院中初降誕内人爭乞洗兒錢宫花不共外邊同正月長生一朶紅供御櫻桃看守别直無鵶鳥到園中殿前鋪設兩邊樓寒食宫人歩打毬一半走來爭跪拜上棚先謝得頭籌太儀前日暖房來囑向昭儀乞藥栽勑賜一窠紅躑躅謝恩未了奏花開御前新賜紫羅襦不下金堦上軟輿宫局總來為喜樂院中新拜内尚書鸚鵡誰教轉舌闗内人手裏養來姦語多更覺承恩澤數對君王憶隴山分朋閑坐賭櫻桃收却投壺玉腕勞各把沉香雙陸子局中鬭累阿誰髙禁寺紅樓内裏通笙歌引駕夾城東褁頭宫監堂前立手把牙弰竹彈弓春風院院落花堆金鎻生衣掣不開更築歌臺起妝殿明朝先進畫圖來舞來汗濕羅衣徹樓上人扶下玉梯歸到院中重洗面金盆水裏潑銀泥宿妝殘粉未明天總在昭陽花樹邊寒食内人長白打庫中先散與金錢衆中偏得君王笑偷把金箱筆硯開書破紅蠻隔子上旋推當直美人來教遍宫娥唱遍詞暗中頭白没人知樓中日日歌聲好不問從初學阿誰青樓小婦砑裙長總被抄名入教坊春設殿前多隊舞棚頭各别請衣裳水中芹葉土中花拾得還將避衆家總待别人般數盡袖中拈出欝金芽玉簫改調箏移柱催換紅羅繡舞筵未戴柘枝花帽子兩行宫監在簾前窗窗戸戸院相當總有珠簾玳瑁牀雖道君王不來宿帳中長是炷衙香銀燭秋光冷畫屏輕羅小扇撲飛螢天街夜色凉如水卧看牽牛織女星一作杜牧雨入珠簾滿殿凉避風新出玉盆湯内人恐要秋衣着不住燻籠換好香金吾除夜進儺名畫袴朱衣四隊行院院燒燈如白日沉香火底坐吹笙樹頭樹底覓殘紅一片西飛一片東自是桃花貪結子錯教人恨五更風金殿當頭紫閣重仙人掌上玉芙蓉太平天子朝元日五色雲車駕六龍日晚長秋簾外報望陵歌舞在明朝添爐欲爇熏衣麝憶得分時不忍燒一作樂府銅雀臺日映西陵松栢枝下臺相顧一相悲朝來樂府歌新曲唱着君王自作詞一作樂府銅雀臺泪盡羅巾夢不成夜深前殿按歌聲紅顔未老恩先斷斜倚熏籠坐到明一作白居易新鷹初放兎初肥白日君王在内稀薄暮千門臨欲鎻紅粧飛騎向前歸此作歴代宫詞不載黄金捍撥紫檀槽絃索初張調更髙盡理昨來新上曲内官簾外送櫻桃此作歴代宫詞不載鴛鴦瓦上瞥然聲晝寢宫娥夢裏驚元是吾皇金彈子海棠花下打流鶯一作花蘂夫人寳仗平明金殿開暫將紈扇共徘徊玉顔不及寒鴉色猶帶昭陽日影來一作王昌齡閑吹玉殿昭華管醉折梨園縹蒂花十年一夢歸人世綘縷猶封繫臂紗一作杜牧附録忽地金輿向月陂内人接着便相隨却因一作囘龍武軍前過當殿一作處教看一作開卧鴨兒一作池畫作天河刻作牛玉梭金鑷采橋頭每年宫女穿針夜勅賜新恩一作諸親乞巧樓春來懶一作晚困不梳頭怕逐一作懶侍君王苑北遊暫向玉花階上立簸錢贏得兩三籌彈棊玉指兩叅差背局臨虚鬭着危先打角頭紅子落上三金字半邊垂宛轉黄金白柄長青荷葉子畫鴛鴦把來不是呈新様欲進㣲風到御牀供御香方加減頻水沈山麝每囬新内中不許相傳出已被醫家寫與人藥童食後進雲漿髙殿無風扇少凉每到日中重掠鬢衩衣騎馬遶宫廊右七首載楊升菴集歩行送出長門逺不許來辭舊院花只恐他時身到此乞求恩赦得還家嫌羅不著索輕􅀈對面教人染褪紅衫子成來一遍出今朝看處滿園中右二首載歴代宫詞王司馬集巻八
