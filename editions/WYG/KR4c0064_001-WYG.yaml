  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0064_WYG_001-1a, image: WYG1078/WYG1078-0579c.png}
body:
  text: 王司馬集巻一唐王建撰送人白日向西沒黄河復東流人生足著地寧免四方遊我行無返顧祝子勿迴頭當須向前去何用起離憂但恐無廣路平地作山丘令我車與馬欲疾反停留蜀客多積貨邊人易封侯男兒戀家鄉歡樂為仇讎丁寧相勸勉苦口幸無尤對面無相成不如豺虎儔彼逺不寄書此寒莫寄裘與君俱絶蹟兩念無因由主人故亭主人昔專城城南起髙亭貴與賔客遊工者夜不寧酒食宴圃人栽接望早成經年使家僮逺道求異英郡中暫閑暇遶樹引諸生開泉浴山籬為愛山中聲世間事難保一旦各徂征死生不相及花落實方榮我未至此中守吏非本名重君昔為主相與下馬行舊島日日摧池水不復清豈無後人賞所貴手自營澆酒向所思風起如有靈此去不重來重來傷我形古從軍漢家一作軍逐單于日没處河曲浮雲道旁起行子車下宿槍城圍鼓角氊帳依山谷馬上懸壺漿刀頭分頰肉來時髙堂上父母親結束迴面不見客風吹破衣服金瘡在肢節相與拔箭鏃聞道西涼州家家婦人哭邯鄲主人逺客無主人夜投邯鄲市飛蛾繞殘燭半夜人醉起壚邊酒家女遺我緗綺被合成雙鳳花宛轉不相離縱令顔色改勿遣合歡異一念始為難萬金誰足貴門前長安道去者如流水晨風羣鳥翔徘徊别離此泛水曲載酒入烟浦方舟泛綠波子釣我復飲子飲我還歌蓮深㣲路通峰曲幽氣多閱芳無留瞬弄桂不停柯水上秋日鮮西山碧峩峩兹歡良可貴誰復更來過江南雜體二首江上風翛翛竹間湘水流日夜桂花落行人去悠悠復見離别處蟲聲隂雨秋處處江草綠行人發瀟湘瀟湘迴雁多日夜思故鄉春夢不知數空山蘭蕙芳逺征歸萬里發遼陽處處問家鄉迴車不淹轍雨雪滿衣裳行見日月疾坐思道路長但令不征戍暗鏡生重光思逺人妾思常懸懸君行復綿綿征途向何處碧海與青天羇人自有念誰令長在邊少年若不歸蘭室如黄泉傷近者不見離人隔中庭幸不為逺征雕梁下有壁聞語亦聞行天涯尚寄信此處不傳情君能竝照水形影自分明元日早朝大國禮樂備萬邦朝元正東方色未動冠劍門已盈帝居在蓬萊肅肅鐘漏清將軍領羽林持㦸廵宫城翠華皆宿陳雪仗羅天兵庭燎逺煌煌旗上日月明聖人龍火衣寢殿開璇扄龍樓横紫烟宫女天中行六蕃陪位次衣服各異形舉頭看玉牌不識宫殿名左右雉扇開蹈舞分滿庭朝服帶金玉珊珊相觸聲泰階備雅樂九奏鸞鳳鳴徘徊慶雲中竽磬寒錚錚三公再獻夀上帝錫永貞天明告四方羣后保太平聞故人自征戍回昔聞着征戍三年一還鄉今來不換兵須死在戰塲念子無氣力徒學事戎行少年得生還有同墮穹蒼自去報爾家再行上髙堂爾父一作弟降廢􅇫爾母縫新裳恍恍恐不真猶未苦承望每日空出城畏渴携壺漿安得縮地經忽使在我傍亦知逺行勞人悴馬𤣥黄慎莫多停留苦我居者腸七泉寺上方長年好名山本性今得從迴看塵蹟遥稍見麋鹿蹤老僧雲中居石門青重重隂泉養成龜古壁飛却龍掃石禮新經懸幡上髙峰日夕猿鳥合覓食聽山鐘將火尋逺泉煮茶傍寒松晚隨收藥人便宿南澗中晨起衝露行濕花枝茸茸歸依向禪師願作香火翁從元太守夏讌西樓六月辰亦熱卑居多煩昏五馬遊西城几杖隨朱輪西樓臨方塘嘉木當華軒鳬鷖滿中流有酒復盈樽山東地無山平視大一作天海垠髙風凉氣來灝景沉清源青衿儼坐傍禮容益存存顧一作願為顔氏徒歌詠夫子門酧栢侍御聞與韋處士同遊靈臺寺見寄西域傳中説靈臺屬雍州有泉皆聖蹟有石皆佛頭所出薝蔔香外國欲來求毒蛇䕶其下樵者不可偷古碑在雲巔備載置寺由魏家移下來後人始增修近與韋處士愛此山之幽各自具所湏竹籠盛茶甌牽馬過危棧襞衣渉奔流草開平路盡林下大石稠過廊轉經峰忽見東西樓瀑布當寺門迸落衣裳秋石苔鋪紫花溪葉裁碧油松根載殿髙飄颻仙山浮縣中賢大夫一月前此遊賽神賀得雨豈暇多停留二十韻新詩逺寄尋山儔清泠玉澗泣冷切石磬愁君名髙難閑餘身愚終休相將長無因從今生離憂荆南贈别李肇著作轉韻詩輝天復耀地再為歌詠始素傳學道徒清門有君子文澗瀉潺潺徳峰來壘壘兩京二十年投食公卿一作卿相間封章既不下故舊多慚顔賣馬市耕牛却歸湘浦山麥收蠶上簇衣食應豐足碧澗伴僧禪秋山對雨宿且歡身體適幸免纓組束上宰鎮荆州敬重同歳遊歡逢通世友簡授畫戎籌遲遲就公食愴愴别野裘主人開宴席禮數無形迹醉笑或顛吟發談皆損益臨甃理芳鮮升堂引賔客早歳慕嘉名逺思今始平孔門忝同轍潘舘幸諸甥自知再婚娶豈望為親情欣欣還切切又二千里别楚筆防寄書蜀茶憂逺熱闗山足重疊㑹合何時節莫歡各從軍且愁岐路分美人停玉指離瑟不中聞爭向巴山夜猿聲滿碧雲早發金堤驛蟲聲四野合月色滿城白家家閉戸眠行人發孤驛離家尚苦熱衣服惟輕綌時節忽復遷秋風徹經脉人睡落塹轍馬驚入蘆荻慰逺時問程驚昏忽揺䇿從軍豈云樂憂患長縈積唯願在家貧團圓過朝夕和裴相公道中贈别張相公雲間雙鳳鳴一去一歸城鞍馬朝天色封章戀闕情日臨宫樹髙烟盖沙草平㑹當戎事息聮影遶池行和錢舍人水植詩盆裏盛野泉晚鮮幽池好初活草根浮重生荷葉小多時水馬出盡日蜻蜓遶朝早獨來看冷星沉碧曉題夀安南館明發行閒亭天暖幽桂碧雲生四面山水接當階石濕堤浴鳥痕破苔卧鹿蹟不縁塵駕觸堪作商皓宅送張籍歸江東清泉澣塵緇靈藥釋昏狂君詩發大雅正氣廽我腸復令五彩姿潔白歸天常昔歳同講道青襟在師傍出處兩相因如彼衣與裳行行成歸計一作此離我適咸陽失意未還家馬蹄盡四方訪餘詠新文不倦道路長僮僕懐昔念亦如還故鄉相親惜晝夜寢息不異牀猶將在逺道忽忽起思量黄金未為罍無以挹酒漿所念俱貧賤安得相發揚廽車逺歸省舊宅江南廂歸鄉非得意但貴情義彰五月天氣熱波濤毒於湯慎勿多飲酒藥膳願自强勵學買地不肥實其繁繫耕鑿良田少鋤理蘭焦香亦薄勿以聽者迷故使宫徴錯誰言三歳童還能分善惡孜孜日求益猶恐業未博况我性頑䝉復不勤修學有如朝暮食暫虧憂隕穫若使無六經賢愚何所託山中寄及第故人長長南山松短短北磵楊俱承日月照幸免斤斧傷去年與子别誠言暫還鄉如何棄我去天路忽騰驤誰謂有雙目識貌不識腸豈知心内乖着我薜蘿裳尋君向前事不歎今異翔徃徃空室中寤寐説珪璋十年居此溪松桂日蒼蒼自從無佳人山中不輝光盡棄所留藥亦焚舊草堂還君誓已書歸我學仙方既為參與辰各願不相望始終名利途慎勿罹咎殃求友鑒形須明鏡療疾須良醫若無傍人見形疾安自知世路薄言行學成棄其師每懐一飯恩千重勸勉詞斆學既不誠朋友道日虧遂作名利交四海爭奔馳常慕正直人生死不相離苟能成我身甘與僮僕隨我言彼當信彼道我無疑針藥及病源以石投深池終朝舉善道敬愛當行之縱令誤所見亦貴本相規不求立名聲所貴去瑕玼一作疵各願貽子孫永為後世資寄李益少監兼送張實游幽州大雅廢已久人倫失其常天若不生君誰復為文綱迷者得道路溺者遇舟航國風人已變山澤増輝光星辰有其位豈合離帝傍賢人既遐征鳳鳥安來翔少小慕髙名所念隔山岡集巻新紙封每讀常焚香古來誰自達取鑒有賢良未為知音故徒恨名不彰諒無金石堅性命豈能長常恐一世中不上君子堂偉哉清河子少年志堅强篋中有素文千里求發揚自顧音韻乖無因合宫商幸君逹精誠為我求逥章寄崔列中丞火山無冷地濁流無清源人生在艱世何處避讒言諸侯鎮九州天子開四門尚有忠義士不得申其寃嘉木移逺植為我當行軒君子居要途易失主人恩我受古人道師君直且温貪泉誓不飲邪路誓不奔如何非岡坂故使車輪飜妓妾隨他人家事幸獲存當時門前客黙黙空寃煩從今遇明代善惡亦須論莫以曾見疑直道遂不敦喻時去者如弊帷來者如新衣鮮華非久長色落還棄遺詎知行者夭豈悟壯者衰區區未死聞一作間廽面相是非好聞苦不樂好視忽生疵乃明萬物情皆逐人心移古今盡如此逹士將何為贈王侍御愚者昧邪正貴將平道行君子抱仁義不懼天地傾三受主人辟方出咸陽城遲疑匪自崇將顯求賢名自來掌軍書無不盡臣誠何必操白刃始致海内平恭事四海人甚於敬公卿有惡如己辱聞善如己榮或人居饑寒進退陳中情徹晏聽苦辛坐卧身不寜以心應所求盡家猶為輕衣食有親疎但恐踰禮經我今願求益詎敢為友生幸君揚素風永作來者程宋氏五女貝州宋處士若芬五女若華若昭若倫若憲若荀五女誓終養貞孝内自持兎絲自縈紆不上青松枝晨昏在親傍閑則讀書詩自得聖人心不因儒者知少年絶音華貴絶父母詞素釵垂兩髦短窄古時儀一作衣行成聞四方徴詔環珮隨同時入皇宫聮影歩玉墀鄉中尚其風重為修茅茨聖朝有良史將此為女師送于丹移家洺州憶昔門館前君當童子年今來見成長俱過述所傳詩禮不外學兄弟相攻研如彼販海翁豈種溪中田四方尚爾文獨我敬爾賢但愛金玉聲不貴金玉堅孤遺一室中寢食不相捐飽如腸胃同疾若膚體連耕一作居者求沃土漚者求深源彼邦君子居一作意一日可徂遷念此居處近各為衣食牽從今不見面猶勝異山川既乖歡㑹期欝欝兩難宣素琴苦無徽安得宫商全他皆緩别日我願促行軒送人莫長歌長歌離恨延羸馬不知去過門常盤旋㑹當為爾隣有地容一泉留别舍弟孤賤相長育未曾為逺遊誰不重歡愛晨昏闕珍羞出門念衣單草木當窮秋非疾有憂歎實為人子尤世情本難合對面隔山丘况復干戈地懦夫何所投與爾俱長成尚為溝壑憂豈非輕歳月少小不勤修從今解思量勉力謀善猷但得成爾身衣食寜我求固合受此訓墮慢為身羞一作讎歳暮當歸來慎莫懐逺愁壊屋官家有壊屋居者願離得苟或幸其遷囬一作因循任傾側若當君子住一日還修餙必使換榱楹先須木端直永令雀與䑕無處求棲息堅固傳後人從今勉勞力以兹喻臣下亦可成邦國雖曰愚者詞將來幸無惑送薛蔓應舉四海重貢獻珠賮稱至珍聖朝開禮闈所貴集嘉賔若生在世間此路出常倫一士登甲科九族光彩新憧憧車馬徒爭踏長安塵萬目視髙天昇者得苦辛况子當少年丈人在咸秦出門見宫闕獻賦待朱輪有賢大國豐無子一家貧男兒富邦家豈為榮其身煌煌文明代俱幸生此辰自顧非國風難以合聖人子去東堂上我歸南澗濵願君勤作書與我山中隣將歸故山留別杜侍御一作郎有川不得渉有路不得行沉沉百憂中一日如一生錯來千諸侯石田廢春耕虎㦸衛重門何因逹中誠日月俱照耀一作輝山川異隂晴如何百里間開目不見明我今歸故山誓與草木并願君去丘坂長使道路平送韋處士老舅憶昨癡小年不知有經籍常隨童子遊多向外家劇偷花入隣里弄筆書􅉹壁照水學梳頭應門未穿幘人前賞文性梨果䝉不惜賦字詠新泉探題得幽石自從出闗輔三十年作客風雨一飄颻親情多阻隔如何二千里塵土驅蹇瘠良久陳苦辛從頭歎衰白既來今又去暫笑還成慽落日動征車春風巻離席雲臺觀西路華嶽祠前栢㑹得過帝鄉重尋舊行蹟送同學故人各為四方人此地同事師業成有先後不得長相隨出林多道路縁岡復遶陂念君辛苦行令我形體疲黄葉墮車前四散當此時亭上夜蕭索山風水離離幽州送申稷評事歸平盧行子繞天北山髙塞復深升堂展客禮臨水濯纓襟驅馳戎地馬聚散林間禽一杯瀉東流各願無異心薊亭雖苦寒春夕勿重衾從軍任白頭莫賣故山岑温門山早入温門山羣峰亂如㦸崩崖欲相觸呀豁斷行迹脱屐尋淺流定足畏欹石路盡十里溪地多千歳栢洞門晝隂黑深處惟石壁似見丹砂光亦聞鐘乳滴靈池出山底沸水衝地脉暖氣成濕烟濛濛窗中白隨僧入古寺便是雲外客月出天氣凉夜鐘山寂寂代故人新姬侍疾雙轂不廻轍子疾已在傍侍坐長揺扇迎醫慚下牀新施箱中幔未洗來時粧奉君纒綿意幸願莫相㤀採桑鳥鳴桑葉間緑條復柔柔攀看去手近散作一作下長長鈎黄花盖野田白馬少年遊所念豈㢠廻顧良人在髙樓曉思春條露霏霏曉氣生綠水林間棲鳥散逺念征人起幽花宿含彩早蝶寒弄翅君行非晨風詎能從門至早起㢠廻燈正衣裳出戸星未稀堂前候姑起環珮生晨輝暗池光羃䍥宻樹花葳蕤九城鐘漏絶遥聽直郎歸酬張十八病中寄詩本性慵逺行綿綿病自生見君綢繆思慰我寂寞情風幌夜不掩秋燈照雨明彼愁此又憶一夕兩盈盈王司馬集巻一
