body:
  text: 王司馬集巻四唐王建撰杜中丞書院新移小竹此地本無竹逺從山寺移經年求養法隔日記澆時嫩緑巻新葉殘黄收故枝色經寒不動聲與靜相宜愛䕶出常數稀稠看自知貧家緣未有客散獨行遲同于汝錫賞白牡丹曉日花初吐春寒白未凝月光裁不得蘇合㸃難勝柔膩於雲葉新鮮掩鶴膺統心黄倒暈側莖紫重稜乍歛看如睡初開問欲􅀢並香幽蕙死比艶美人憎價數千金貴形相兩眼疼自知顔色好愁被彩光凌送吳郎中赴忠州西臺復南省清白上天知家每因窮散官多為直移廵邊過驛近買藥出城遲朝野憑人别親情伴酒悲故園愁去後白髮想廽時何處忠州界山頭卓望旗照鏡終日日纒繞此身無適縁萬愁生旅夜百病湊衰年少睡憎明屋慵行待煖天癢頭梳有虱風耳炙聞蟬換白方多錯廽金法不全家悲一作貧何所戀時在老僧邊秋日送杜䖍州憶得宿新宅别來餘蕙香初聞守郡逺一日卧空牀野一作井驛烟火濕路人消息狂山樓添鼓角村柵立旗槍晚一作夕渚露荷敗早衙風桂凉謝家章句出江月少輝光王司馬集巻四
  hash: sha256:5a53f727f8c83d757f7f11628c9c0ae3ec19240a3aabf83f0665e2e818f6400f
